<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ürünler — ATLAS SPOR</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--red:#E8000D;--red-dark:#B0000A;--black:#0A0A0A;--dark2:#1A1A1A;--white:#ffffff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:#f5f5f5;color:#111;overflow-x:hidden;}
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:70px;background:#fff;border-bottom:2px solid rgba(232,0,13,0.15);box-shadow:0 2px 20px rgba(0,0,0,0.08);}
.nav-logo{font-family:'Syne',sans-serif;font-size:24px;letter-spacing:4px;color:#0a0a0a;display:flex;align-items:center;gap:10px;text-decoration:none;font-weight:800;}
.nav-logo span{color:var(--red);}
.nav-logo img{height:38px;width:auto;}
.btn-cart{background:var(--red);color:white;border:none;padding:10px 24px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);transition:background 0.2s;display:flex;align-items:center;gap:8px;}
.btn-cart:hover{background:var(--red-dark);}
.cart-count{background:white;color:var(--red);font-size:11px;font-weight:900;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;}

/* Hero banner */
.cat-hero{background:#111;color:white;padding:48px 80px;position:relative;overflow:hidden;}
.cat-hero::before{content:'';position:absolute;right:0;top:0;bottom:0;width:40%;background:linear-gradient(135deg,transparent,rgba(232,0,13,0.08));}
.cat-hero-label{font-size:11px;color:var(--red);letter-spacing:4px;font-weight:700;text-transform:uppercase;margin-bottom:8px;}
.cat-hero-title{font-family:'Syne',sans-serif;font-size:56px;font-weight:800;line-height:1;}
.cat-hero-sub{color:rgba(255,255,255,0.5);font-size:14px;margin-top:12px;}

/* Layout */
.list-layout{display:grid;grid-template-columns:260px 1fr;gap:0;padding:0 80px 80px;max-width:1400px;margin:0 auto;}

/* Sidebar filters */
.filters{padding:32px 32px 32px 0;}
.filter-section{margin-bottom:28px;}
.filter-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;color:#111;display:flex;justify-content:space-between;cursor:pointer;}
.filter-option{display:flex;align-items:center;gap:10px;padding:6px 0;cursor:pointer;font-size:14px;color:rgba(0,0,0,0.7);transition:color 0.2s;}
.filter-option:hover{color:var(--red);}
.filter-option input[type=checkbox]{accent-color:var(--red);width:16px;height:16px;}
.filter-option.active{color:var(--red);font-weight:700;}
.price-range{display:flex;gap:8px;align-items:center;}
.price-range input{width:80px;border:1px solid rgba(0,0,0,0.15);padding:8px;font-family:'DM Sans',sans-serif;font-size:13px;}
.btn-apply{background:#111;color:white;border:none;padding:8px 16px;font-size:12px;font-weight:700;letter-spacing:1px;cursor:pointer;}
.btn-apply:hover{background:var(--red);}
.filter-divider{height:1px;background:rgba(0,0,0,0.08);margin-bottom:28px;}

/* Products area */
.products-area{padding:32px 0 0 32px;border-left:1px solid rgba(0,0,0,0.08);}
.products-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
.products-count{font-size:14px;color:rgba(0,0,0,0.5);}
.sort-select{border:1px solid rgba(0,0,0,0.15);padding:8px 12px;font-family:'DM Sans',sans-serif;font-size:13px;background:white;cursor:pointer;}
.products-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.product-card{background:#fff;cursor:pointer;transition:transform 0.25s,box-shadow 0.25s;border:1px solid rgba(0,0,0,0.06);}
.product-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,0.1);}
.product-card:hover .prod-img{transform:scale(1.08);}
.prod-img-wrap{height:200px;overflow:hidden;background:linear-gradient(135deg,#f0f0f0,#e8e8e8);display:flex;align-items:center;justify-content:center;position:relative;}
.prod-img{font-size:80px;transition:transform 0.4s;filter:drop-shadow(0 8px 16px rgba(0,0,0,0.15));}
.prod-badge{position:absolute;top:10px;left:10px;background:var(--red);color:white;padding:3px 10px;font-size:10px;font-weight:900;letter-spacing:2px;clip-path:polygon(0 0,100% 0,calc(100% - 6px) 100%,0 100%);}
.prod-info{padding:16px;}
.prod-brand{font-size:10px;color:var(--red);letter-spacing:2px;font-weight:700;text-transform:uppercase;}
.prod-name{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-top:4px;line-height:1.3;color:#111;}
.prod-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
.prod-price{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--red);}
.prod-old{font-size:13px;color:rgba(0,0,0,0.3);text-decoration:line-through;margin-left:4px;}
.btn-add{background:#111;border:none;color:white;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);transition:background 0.2s;opacity:0;}
.product-card:hover .btn-add{opacity:1;}
.btn-add:hover{background:var(--red);}

/* Cat tabs */
.cat-tabs{display:flex;gap:4px;padding:16px 80px 0;background:#fff;border-bottom:1px solid rgba(0,0,0,0.08);}
.cat-tab{padding:12px 20px;background:transparent;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;color:rgba(0,0,0,0.5);position:relative;transition:color 0.2s;}
.cat-tab::after{content:'';position:absolute;bottom:-1px;left:0;right:100%;height:3px;background:var(--red);transition:right 0.3s;}
.cat-tab.active{color:#111;}
.cat-tab.active::after{right:0;}
.cat-tab:hover{color:#111;}

/* Cart sidebar */
.cart-sidebar{position:fixed;top:0;right:-420px;bottom:0;width:420px;background:#fff;border-left:1px solid rgba(0,0,0,0.1);z-index:200;transition:right 0.4s;display:flex;flex-direction:column;box-shadow:-8px 0 32px rgba(0,0,0,0.1);}
.cart-sidebar.open{right:0;}
.cart-header{padding:24px;border-bottom:1px solid rgba(0,0,0,0.1);display:flex;justify-content:space-between;align-items:center;}
.cart-header h3{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;letter-spacing:2px;}
.close-cart{background:none;border:1px solid rgba(0,0,0,0.2);color:#111;width:36px;height:36px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.close-cart:hover{background:var(--red);border-color:var(--red);color:white;}
.cart-items{flex:1;overflow-y:auto;padding:24px;}
.cart-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:rgba(0,0,0,0.3);font-size:14px;gap:12px;}
.cart-item{display:flex;gap:16px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid rgba(0,0,0,0.07);align-items:center;}
.cart-item-img{width:70px;height:70px;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:36px;flex-shrink:0;}
.cart-item-info{flex:1;}
.cart-item-name{font-size:14px;font-weight:600;color:#111;}
.cart-item-price{color:var(--red);font-weight:700;margin-top:4px;font-size:15px;}
.cart-item-remove{background:none;border:none;color:rgba(0,0,0,0.3);font-size:18px;cursor:pointer;}
.cart-item-remove:hover{color:var(--red);}
.cart-footer{padding:24px;border-top:1px solid rgba(0,0,0,0.1);}
.cart-total{display:flex;justify-content:space-between;margin-bottom:16px;}
.cart-total span{font-size:14px;color:rgba(0,0,0,0.5);}
.cart-total strong{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--red);}
.btn-checkout{background:var(--red);color:white;border:none;padding:16px;font-family:'Syne',sans-serif;font-size:16px;font-weight:800;letter-spacing:2px;cursor:pointer;width:100%;transition:background 0.2s;}
.btn-checkout:hover{background:var(--red-dark);}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:150;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.overlay.show{opacity:1;pointer-events:all;}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:#111;color:white;border-left:4px solid var(--red);padding:14px 28px;font-size:14px;font-weight:600;z-index:300;transition:transform 0.4s;}
.toast.show{transform:translateX(-50%) translateY(0);}

@media(max-width:900px){
  nav{padding:0 16px;}
  .cat-hero{padding:32px 20px;}
  .cat-hero-title{font-size:36px;}
  .cat-tabs{padding:0 16px;overflow-x:auto;}
  .list-layout{grid-template-columns:1fr;padding:0 16px 60px;}
  .filters{padding:20px 0;display:none;}
  .products-area{padding:20px 0 0 0;border-left:none;}
  .products-grid{grid-template-columns:1fr 1fr;gap:10px;}
}
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeCart()"></div>
<div class="toast" id="toast">✓ Sepete eklendi</div>

<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-header">
    <h3>SEPETİM</h3>
    <button class="close-cart" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems"><div class="cart-empty">🛒<br>Sepetiniz boş</div></div>
  <div class="cart-footer">
    <div class="cart-total"><span>TOPLAM</span><strong id="cartTotal">₺0</strong></div>
    <button class="btn-checkout" onclick="goToCheckout()">SİPARİŞİ TAMAMLA →</button>
  </div>
</div>

  {id:1,name:'Mercurial Vapor Elite',brand:'Nike',price:3499,oldPrice:4299,emoji:'⚡',badge:'YENİ',cat:'krampon'},
  {id:2,name:'Predator Accuracy+',brand:'Adidas',price:2999,oldPrice:null,emoji:'🔥',badge:'ÇOK SATAN',cat:'krampon'},
  {id:3,name:'Future Ultimate FG',brand:'Puma',price:2799,oldPrice:3299,emoji:'💫',badge:'İNDİRİM',cat:'krampon'},
  {id:4,name:'Copa Pure+ FG',brand:'Adidas',price:1899,oldPrice:null,emoji:'⚽',badge:'YENİ',cat:'krampon'},
  {id:5,name:'Tiempo Legend 10',brand:'Nike',price:3199,oldPrice:3799,emoji:'👟',badge:'İNDİRİM',cat:'krampon'},
  {id:6,name:'Mizuno Morelia Neo IV',brand:'Mizuno',price:2499,oldPrice:null,emoji:'🌟',badge:'YENİ',cat:'krampon'},
  {id:7,name:'Phantom GX Elite TF',brand:'Nike',price:2399,oldPrice:2899,emoji:'🏃',badge:'İNDİRİM',cat:'halisaha'},
  {id:8,name:'Copa Pure TF',brand:'Adidas',price:1499,oldPrice:null,emoji:'⚽',badge:'YENİ',cat:'halisaha'},
  {id:9,name:'Future Play TF',brand:'Puma',price:1299,oldPrice:1599,emoji:'💪',badge:'İNDİRİM',cat:'halisaha'},
  {id:10,name:'Predator Club TF',brand:'Adidas',price:1199,oldPrice:null,emoji:'🔥',badge:'YENİ',cat:'halisaha'},
  {id:11,name:'Air Zoom Rival',brand:'Nike',price:2299,oldPrice:2799,emoji:'👟',badge:'İNDİRİM',cat:'spor'},
  {id:12,name:'Ultraboost 23',brand:'Adidas',price:2799,oldPrice:null,emoji:'🌊',badge:'YENİ',cat:'spor'},
  {id:13,name:'RS-X',brand:'Puma',price:1899,oldPrice:2299,emoji:'🎯',badge:'İNDİRİM',cat:'spor'},
  {id:14,name:'Atlas Pro Forma',brand:'Atlas',price:899,oldPrice:1199,emoji:'👕',badge:'İNDİRİM',cat:'forma'},
  {id:15,name:'Atlas Kaptan Forma',brand:'Atlas',price:749,oldPrice:null,emoji:'🧥',badge:'YENİ',cat:'forma'},
  {id:16,name:'Atlas Kaleci Forması',brand:'Atlas',price:849,oldPrice:999,emoji:'🥅',badge:'İNDİRİM',cat:'forma'},
  {id:17,name:'Krampon Çantası',brand:'Atlas',price:599,oldPrice:null,emoji:'🎒',badge:'YENİ',cat:'aksesuar'},
  {id:18,name:'Grip Çorap (x3)',brand:'Atlas',price:299,oldPrice:399,emoji:'🧦',badge:'İNDİRİM',cat:'aksesuar'},
  {id:19,name:'Krampon Bakım Spreyi',brand:'Atlas',price:199,oldPrice:null,emoji:'🧴',badge:'YENİ',cat:'aksesuar'},
  {id:20,name:'Yedek Bağcık Seti',brand:'Atlas',price:149,oldPrice:199,emoji:'👟',badge:'İNDİRİM',cat:'aksesuar'},
];

let currentCat = 'all';
let sortMode = 'default';
let cart = [];

function init() {
  const params = new URLSearchParams(window.location.search);
  const cat = params.get('kategori') || 'all';
  currentCat = cat;
  
  // Activate tab
  document.querySelectorAll('.cat-tab').forEach(t => {
    if (t.dataset.cat === cat) t.classList.add('active');
  });
  
  updateHero(cat);
  renderProducts();
}

const catMeta = {
  all: {label:'KOLEKSİYON', title:'TÜM ÜRÜNLER', sub:'500+ ürün — Her sporcuya özel seçenekler'},
  krampon: {label:'FUTBOL', title:'KRAMPONLAR', sub:'Nike · Adidas · Puma · Mizuno — Elite seviye seçenekler'},
  halisaha: {label:'HALİ SAHA', title:'HALI SAHA', sub:'TF · Futsal — Her zemin için doğru tercih'},
  spor: {label:'LIFESTYLE', title:'SPOR AYAKKABI', sub:'Günlük kullanım için şık ve konforlu seçenekler'},
  forma: {label:'GİYİM', title:'FORMALAR', sub:'Özel üretim · Kulüp formaları · Kaleci'},
  aksesuar: {label:'AKSESUAR', title:'AKSESUARLAR', sub:'Çanta · Çorap · Bakım ürünleri'},
};

function updateHero(cat) {
  const m = catMeta[cat] || catMeta.all;
  document.getElementById('heroLabel').textContent = m.label;
  document.getElementById('heroTitle').textContent = m.title;
  document.getElementById('heroSub').textContent = m.sub;
}

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  updateHero(cat);
  renderProducts();
  // Update URL
  const url = new URL(window.location);
  url.searchParams.set('kategori', cat);
  history.pushState({}, '', url);
}

function sortProducts(mode) {
  sortMode = mode;
  renderProducts();
}

function renderProducts() {
  let filtered = currentCat === 'all' ? [...allProducts] : allProducts.filter(p => p.cat === currentCat);
  
  const minP = parseInt(document.getElementById('priceMin').value)||0;
  const maxP = parseInt(document.getElementById('priceMax').value)||99999;
  filtered = filtered.filter(p => p.price >= minP && p.price <= maxP);
  
  if (sortMode === 'price-asc') filtered.sort((a,b) => a.price - b.price);
  if (sortMode === 'price-desc') filtered.sort((a,b) => b.price - a.price);
  if (sortMode === 'new') filtered = filtered.filter(p => p.badge==='YENİ').concat(filtered.filter(p => p.badge!=='YENİ'));
  
  document.getElementById('productsCount').textContent = filtered.length + ' ürün';
  
  const grid = document.getElementById('productsGrid');
  grid.innerHTML = filtered.map(p => `
    <div class="product-card" onclick="goToProduct(${p.id})">
      <div class="prod-img-wrap">
        <div class="prod-img">${p.emoji}</div>
        <div class="prod-badge">${p.badge}</div>
      </div>
      <div class="prod-info">
        <div class="prod-brand">${p.brand}</div>
        <div class="prod-name">${p.name}</div>
        <div class="prod-bottom">
          <div>
            <span class="prod-price">₺${p.price.toLocaleString('tr-TR')}</span>
            ${p.oldPrice?`<span class="prod-old">₺${p.oldPrice.toLocaleString('tr-TR')}</span>`:''}
          </div>
          <button class="btn-add" onclick="event.stopPropagation();addToCart(${p.id})">+</button>
        </div>
      </div>
    </div>
  `).join('');
}

function toggleSize(el, size) {
  el.style.background = el.style.background === 'rgb(26, 26, 26)' ? '#f0f0f0' : '#1a1a1a';
  el.style.color = el.style.color === 'white' ? '#111' : 'white';
  el.style.borderColor = el.style.borderColor === 'rgb(232, 0, 13)' ? 'rgba(0,0,0,0.12)' : 'rgb(232, 0, 13)';
}

function goToProduct(id) {
  window.location.href = 'urun-detay.html';
}

function addToCart(id) {
  const p = allProducts.find(x => x.id===id);
  const ex = cart.find(x => x.id===id);
  if(ex) ex.qty=(ex.qty||1)+1; else cart.push({...p,qty:1});
  updateCart();
  showToast(p.name+' sepete eklendi!');
}

function updateCart() {
  document.getElementById('cartCount').textContent = cart.reduce((s,i)=>s+(i.qty||1),0);
  const total = cart.reduce((s,i)=>s+i.price*(i.qty||1),0);
  document.getElementById('cartTotal').textContent = '₺'+total.toLocaleString('tr-TR');
  const el = document.getElementById('cartItems');
  if(!cart.length){el.innerHTML='<div class="cart-empty">🛒<br>Sepetiniz boş</div>';return;}
  el.innerHTML = cart.map((item,i)=>`
    <div class="cart-item">
      <div class="cart-item-img">${item.emoji}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name} ${(item.qty||1)>1?'x'+(item.qty||1):''}</div>
        <div class="cart-item-price">₺${(item.price*(item.qty||1)).toLocaleString('tr-TR')}</div>
      </div>
      <button class="cart-item-remove" onclick="removeItem(${i})">✕</button>
    </div>
  `).join('');
}

function removeItem(i){cart.splice(i,1);updateCart();}

function toggleCart(){
  document.getElementById('cartSidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeCart(){
  document.getElementById('cartSidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent='✓ '+msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
function goToCheckout(){
  sessionStorage.setItem('atlasCart',JSON.stringify(cart.map(i=>{return {name:i.name,price:i.price,emoji:i.emoji,qty:i.qty||1};})));
  window.location.href='odeme.html';
}

init();
</script>
</body>
</html>
